<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"><\/script>
<style>
:root{--bg0:#080d17;--bg1:#0d1525;--bg2:#111d32;--bg3:#172040;--surface:#1a2644;--border:rgba(99,179,237,0.12);--border2:rgba(99,179,237,0.22);--teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.12);--blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);--amber:#fbbf24;--amber-dim:rgba(251,191,36,0.12);--green:#4ade80;--coral:#fb7185;--coral-dim:rgba(251,113,133,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--mono:"JetBrains Mono",monospace;--sans:"Sora",sans-serif;--r:10px;--rl:16px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg0);color:var(--text);min-height:100vh;overflow-x:hidden;}
.sidebar{position:fixed;top:0;left:0;width:240px;height:100vh;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;overflow-y:auto;}
.s-logo{padding:18px 20px 14px;border-bottom:1px solid var(--border);}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;margin-bottom:8px;}
.s-logo h2{font-size:13px;font-weight:700;color:var(--text);}
.s-logo p{font-size:10px;color:var(--text3);margin-top:1px;}
.n-sect{padding:8px 0;}
.n-lbl{font-family:var(--mono);font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;padding:0 18px 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:7px 18px;font-size:11px;color:var(--text2);cursor:pointer;border-left:2px solid transparent;transition:all .2s;text-decoration:none;}
.ni:hover{color:var(--text);background:rgba(255,255,255,.03);}
.ni.active{color:var(--teal);border-left-color:var(--teal);background:var(--teal-dim);}
.ni.p2.active{color:var(--purple);border-left-color:var(--purple);background:var(--purple-dim);}
.s-foot{margin-top:auto;padding:12px 18px;border-top:1px solid var(--border);font-size:9px;color:var(--text3);line-height:1.7;}
.main{margin-left:240px;min-height:100vh;}
.ps{display:none;padding:28px 32px;}
.ps.active{display:block;animation:fi .3s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hero{background:var(--bg1);border-bottom:1px solid var(--border);padding:32px 32px 24px;margin:-28px -32px 28px;}
.htag{font-family:var(--mono);font-size:9px;color:var(--teal);letter-spacing:.08em;margin-bottom:8px;}
.hero h1{font-size:24px;font-weight:700;line-height:1.25;margin-bottom:7px;}
.hero h1 span{color:var(--teal);}
.hero p{font-size:12px;color:var(--text2);line-height:1.7;max-width:600px;}
.ph{margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.bc{font-family:var(--mono);font-size:9px;color:var(--teal);margin-bottom:4px;letter-spacing:.05em;}
.bc.p2{color:var(--purple);}
.ph h1{font-size:20px;font-weight:700;margin-bottom:3px;}
.ph p{font-size:12px;color:var(--text2);line-height:1.6;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 20px;}
.ct{font-size:9px;font-family:var(--mono);color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px;}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;position:relative;overflow:hidden;}
.mc::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--teal));}
.ml{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.mv{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1;margin-bottom:2px;}
.ms{font-size:10px;color:var(--text3);}
.bx{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-family:var(--mono);margin-top:4px;}
.bt{background:var(--teal-dim);color:var(--teal);} .bb{background:var(--blue-dim);color:var(--blue);} .ba{background:var(--amber-dim);color:var(--amber);} .bc2{background:var(--coral-dim);color:var(--coral);} .bp{background:var(--purple-dim);color:var(--purple);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}
.g65{display:grid;grid-template-columns:1.8fr 1fr;gap:16px;margin-bottom:16px;}
.cw{position:relative;width:100%;}
.h200{height:200px;}.h240{height:240px;}.h260{height:260px;}.h280{height:280px;}.h300{height:300px;}
.pipe{display:flex;align-items:flex-start;gap:0;min-width:820px;padding:14px 6px;}
.pst{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;}
.pst:not(:last-child)::after{content:"";position:absolute;top:22px;right:-20px;width:40px;height:1px;background:linear-gradient(90deg,var(--teal),var(--blue));z-index:1;}
.pn{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;border:1px solid var(--border2);position:relative;z-index:2;}
.pl{font-size:10px;font-weight:600;color:var(--text);text-align:center;}
.psb{font-size:9px;color:var(--text3);text-align:center;font-family:var(--mono);line-height:1.4;}
.modc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px;position:relative;transition:border-color .2s;}
.modc.best{border-color:rgba(45,212,191,.4);}
.modc.best::before{content:"★ BEST";position:absolute;top:9px;right:9px;font-family:var(--mono);font-size:8px;color:var(--teal);background:var(--teal-dim);border:1px solid rgba(45,212,191,.3);padding:2px 5px;border-radius:4px;}
.mn{font-size:13px;font-weight:700;margin-bottom:2px;}
.mtp{font-family:var(--mono);font-size:8px;color:var(--text3);margin-bottom:12px;letter-spacing:.04em;}
.mst{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}
.sb{background:var(--bg2);border-radius:6px;padding:8px 10px;border:1px solid var(--border);}
.sbl{font-family:var(--mono);font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;}
.sbv{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--text);}
.r2b{height:3px;background:var(--bg3);border-radius:2px;margin-top:3px;overflow:hidden;}
.r2f{height:100%;border-radius:2px;}
.fr{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.fn2{font-family:var(--mono);font-size:10px;color:var(--text2);min-width:70px;}
.fbw{flex:1;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.fb{height:100%;border-radius:3px;}
.fv{font-family:var(--mono);font-size:9px;color:var(--text3);min-width:32px;text-align:right;}
.dt{width:100%;border-collapse:collapse;font-size:10px;}
.dt th{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:6px 9px;border-bottom:1px solid var(--border);text-align:left;}
.dt td{padding:7px 9px;color:var(--text2);border-bottom:1px solid rgba(99,179,237,.05);font-family:var(--mono);font-size:9px;}
.ct2{width:100%;border-collapse:collapse;}
.ct2 th,.ct2 td{padding:8px 11px;font-size:10px;border-bottom:1px solid var(--border);text-align:left;}
.ct2 th{font-family:var(--mono);font-size:8px;text-transform:uppercase;color:var(--text3);background:var(--bg2);}
.ct2 td{font-family:var(--mono);color:var(--text2);}
.hl{color:var(--teal);font-weight:600;}
.pl2{display:flex;flex-direction:column;gap:0;}
.pi{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.pi:last-child{border-bottom:none;}
.pnum{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:9px;font-weight:600;flex-shrink:0;margin-top:1px;}
.pb h4{font-size:11px;font-weight:600;color:var(--text);margin-bottom:2px;}
.pb p{font-size:10px;color:var(--text2);line-height:1.6;}
.cb{background:var(--bg0);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;font-family:var(--mono);font-size:10px;line-height:1.7;color:var(--text2);overflow-x:auto;}
.kw{color:var(--purple);}.fn{color:var(--blue);}.str{color:var(--teal);}.num{color:var(--amber);}.cm{color:var(--text3);}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab{padding:6px 12px;font-size:11px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);}
.pcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:20px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;gap:12px;}
.pcard:hover{border-color:var(--border2);transform:translateY(-2px);}
.pcard.p1:hover{border-color:rgba(45,212,191,.4);}
.pcard.p2:hover{border-color:rgba(167,139,250,.4);}
.pico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.pico.i1{background:var(--teal-dim);}.pico.i2{background:var(--purple-dim);}
.ptit{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px;}
.psub{font-size:10px;color:var(--text3);font-family:var(--mono);}
.pdesc{font-size:11px;color:var(--text2);line-height:1.6;}
.pstats{display:flex;gap:8px;flex-wrap:wrap;}
.pst2{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:6px 11px;text-align:center;}
.pst2 .v{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);}
.pst2 .l{font-family:var(--mono);font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.ptags{display:flex;gap:5px;flex-wrap:wrap;}
.ptag{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);color:var(--text3);}
.pbtn{align-self:flex-start;font-family:var(--mono);font-size:9px;padding:5px 12px;border-radius:5px;border:1px solid;cursor:pointer;background:transparent;letter-spacing:.04em;}
.pbtn.b1{border-color:rgba(45,212,191,.4);color:var(--teal);}
.pbtn.b2{border-color:rgba(167,139,250,.4);color:var(--purple);}
.ip{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);color:var(--text3);margin:0 5px 5px 0;}
.div{height:1px;background:var(--border);margin:16px 0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px;}
</style>
</head>

<section id="s-p2code" class="ps">
<div class="ph"><div class="bc p2">&#129504; CODE REFERENCE</div><h1>EfficientNet Pipeline Code</h1><p>PyTorch implementation &mdash; model setup, training, evaluation. GitHub: github.com/supinfl/UoS_HBAC</p></div>
<div class="tabs">
  <div class="tab active" onclick="t2(this,'t2m')">Model Setup</div>
  <div class="tab" onclick="t2(this,'t2t')">Training Loop</div>
  <div class="tab" onclick="t2(this,'t2e')">Evaluation</div>
</div>
<div id="t2m" class="cb"><span class="kw">import</span> timm, torch, torch.nn <span class="kw">as</span> nn<br><br><span class="kw">class</span> <span class="fn">CustomModel</span>(nn.Module):<br>    <span class="kw">def</span> <span class="fn">__init__</span>(self):<br>        super().<span class="fn">__init__</span>()<br>        <span class="cm"># EfficientNet via timm</span><br>        self.model = timm.<span class="fn">create_model</span>(<br>            <span class="str">'tf_efficientnet_b0'</span>,<br>            pretrained=<span class="num">True</span>,<br>            in_chans=<span class="num">4</span>,   <span class="cm"># 4-channel spectrogram</span><br>            num_classes=<span class="num">6</span>  <span class="cm"># 6 activity classes</span><br>        )<br>    <span class="kw">def</span> <span class="fn">forward</span>(self, x):<br>        <span class="kw">return</span> self.model(x)<br><br><span class="cm"># AdamW + OneCycleLR scheduler</span><br>optimizer = torch.optim.<span class="fn">AdamW</span>(model.<span class="fn">parameters</span>(), lr=<span class="num">1e-3</span>)<br>scheduler = torch.optim.lr_scheduler.<span class="fn">OneCycleLR</span>(<br>    optimizer, max_lr=<span class="num">1e-3</span>, steps_per_epoch=<span class="fn">len</span>(train_loader), epochs=<span class="num">3</span>)</div>
<div id="t2t" class="cb" style="display:none"><span class="cm"># KL Divergence Loss</span><br>criterion = nn.<span class="fn">KLDivLoss</span>(reduction=<span class="str">'batchmean'</span>)<br><br><span class="kw">for</span> epoch <span class="kw">in</span> <span class="fn">range</span>(<span class="num">3</span>):  <span class="cm"># 3 epochs, 3-fold CV</span><br>    <span class="kw">for</span> batch <span class="kw">in</span> train_loader:<br>        specs  = batch[<span class="str">'spectrograms'</span>].to(device)<br>        labels = batch[<span class="str">'labels'</span>].to(device)<br>        <span class="kw">with</span> torch.cuda.amp.<span class="fn">autocast</span>():  <span class="cm"># Mixed precision</span><br>            preds = model(specs)<br>            preds = nn.functional.<span class="fn">log_softmax</span>(preds, dim=<span class="num">1</span>)<br>            loss  = <span class="fn">criterion</span>(preds, labels)<br>        <span class="cm"># Gradient clipping (avoids exploding gradients)</span><br>        scaler.<span class="fn">scale</span>(loss).<span class="fn">backward</span>()<br>        torch.nn.utils.<span class="fn">clip_grad_norm_</span>(model.<span class="fn">parameters</span>(), <span class="num">1.0</span>)<br>        scaler.<span class="fn">step</span>(optimizer)<br>        scheduler.<span class="fn">step</span>()</div>
<div id="t2e" class="cb" style="display:none"><span class="cm"># KL Divergence evaluation function</span><br><span class="kw">def</span> <span class="fn">get_result</span>(oof_df):<br>    kl_loss = nn.<span class="fn">KLDivLoss</span>(reduction=<span class="str">'batchmean'</span>)<br>    labels  = torch.<span class="fn">tensor</span>(oof_df[label_cols].values)<br>    preds   = torch.<span class="fn">tensor</span>(oof_df[pred_cols].values)<br>    preds   = F.<span class="fn">log_softmax</span>(preds, dim=<span class="num">1</span>)<br>    <span class="kw">return</span> <span class="fn">kl_loss</span>(preds, labels).<span class="fn">item</span>()<br><br><span class="cm"># Results</span><br><span class="cm"># Stage 1 (full data):       CV = 1.2792</span><br><span class="cm"># Stage 2 (KL &lt; 9 filter):  CV = 1.2527 ✓</span><br><br><span class="cm"># Code: github.com/supinfl/UoS_HBAC/tree/baseline</span></div>
